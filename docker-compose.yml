version: '3.9'

services:

  server:
    build:
      context: ./server
    restart: unless-stopped
    env_file: ./server/.env
    environment:
      NODE_ENV: production
      CLIENT_URL: http://localhost
    ports:
      - "5000:5000"
    volumes:
      - uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  client:
    build:
      context: ./client
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      server:
        condition: service_healthy

volumes:
  uploads:
